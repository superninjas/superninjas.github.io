name: Atualização Diária de Ofertas

on:
  schedule:
    - cron: '0 0 * * *' # Todo dia à meia-noite UTC
  workflow_dispatch: # Permite rodar manualmente

jobs:
  update-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4

      - name: Executar Scraper e Auditoria
        run: |
          # Aqui o script vai buscar novas ofertas e validar as atuais
          python3 scripts/build_radar_comercial.py

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "Radar Ninja Bot"
          git config --global user.email "bot@radarninja.com.br"
          git add .
          git commit -m "chore: atualização diária automática de ofertas e preços" || echo "Sem alterações para commitar"
          git push origin main
