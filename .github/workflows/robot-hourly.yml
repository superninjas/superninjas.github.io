name: Radar Ninja Hourly Publisher

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-ninja-hourly-publisher
  cancel-in-progress: false

jobs:
  publish:
    name: Generate, commit and publish new content
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Radar Ninja automation pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BLOG_POST_COUNT: '1'
          PYTHONUNBUFFERED: '1'
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          bash run_bot_24_7.sh
          python scripts/generate_sitemaps.py
          python scripts/generate_feeds.py

      - name: Validate generated artifacts
        run: |
          test -f noticias/index.html
          test -d noticias/posts
          test -f sitemap.xml
          test -f sitemap-noticias.xml
          test -f feed.xml
          test -f atom.xml
          python - <<'PY'
          import ast
          from pathlib import Path
          for path in Path('scripts').glob('*.py'):
              ast.parse(path.read_text(encoding='utf-8'), filename=str(path))
          print('Python syntax validation OK')
          PY

      - name: Commit and push generated publication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No generated changes to publish."
          else
            git commit -m "chore: publicacao automatica Radar Ninja $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
