<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Radar Ninja</title>
    <meta name="description" content="{{description}}">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="application/ld+json">{{schema}}</script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">🥷</span>
                <span class="logo-text">Radar Ninja</span>
            </a>
            <nav class="nav">
                <a href="/guias/">Guias Ninja</a>
                <a href="/comparativos/">Comparativos</a>
                <a href="/ofertas/">Ofertas do Dia</a>
                <a href="/sobre/">Sobre</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="article-content" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
            <header class="article-header">
                <nav class="breadcrumb" style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">
                    <a href="/">Início</a> > <a href="/{{category_slug}}/">{{category_name}}</a>
                </nav>
                <h1 style="font-size: 2.5rem; line-height: 1.2; margin-bottom: 20px;">{{title}}</h1>
                <div class="meta" style="color: #888; margin-bottom: 30px;">
                    Por Equipe Radar Ninja • Atualizado em {{date}}
                </div>
            </header>

            <div class="article-body" style="line-height: 1.8; font-size: 1.1rem; color: #333;">
                {{content}}
            </div>
        </article>
    </main>

    <footer class="footer" style="margin-top: 60px; padding: 40px 20px; background: #1a1a1a; color: #fff; text-align: center;">
        <p>&copy; 2026 Radar Ninja - Portal de Inteligência de Compra</p>
    </footer>
</body>
</html>
