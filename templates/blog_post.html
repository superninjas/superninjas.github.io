<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{post.title}} | Radar Ninja</title>
    <meta name="description" content="{{post.summary}}">
    <meta name="google-adsense-account" content="ca-pub-4896859041377751">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4896859041377751" crossorigin="anonymous"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">🥷 <strong>Radar Ninja</strong></a>
        </div>
    </header>

    <main class="container">
        <article class="post-content">
            <h1>{{post.title}}</h1>
            <div class="post-meta">Publicado em {{post.date}}</div>
            
            <div class="ads-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-4896859041377751"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="content">
                {{post.content}}
            </div>
        </article>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Radar Ninja</p>
        </div>
    </footer>
</body>
</html>
