<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   {{category.name}} | Radar Ninja
  </title>
  <meta content="Confira as melhores ofertas de {{category.name}} selecionadas pelo Radar Ninja." name="description"/>
  <meta content="ca-pub-4896859041377751" name="google-adsense-account"/>
  <link href="../../assets/css/style.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
  <script async="" crossorigin="anonymous" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4896859041377751">
  </script>
 </head>
 <body>
  <header class="header">
   <div class="container">
    <a class="logo" href="/">
     🥷
     <strong>
      Radar Ninja
     </strong>
    </a>
   </div>
  </header>
  <main class="container">
   <h1 class="category-title">
    Ofertas de {{category.name}}
   </h1>
   <div class="ads-container">
    <ins class="adsbygoogle" data-ad-client="ca-pub-4896859041377751" data-ad-format="auto" data-ad-slot="auto" data-full-width-responsive="true" style="display:block">
    </ins>
    <script>
     (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
   </div>
   <div class="product-grid">
    {{category.products}}
   </div>
  </main>
  <footer class="footer">
   <div class="container">
    <p>
     © 2026 Radar Ninja
    </p>
   </div>
  </footer>
 </body>
</html>
